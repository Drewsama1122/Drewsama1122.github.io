<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Introduction</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
          font-family: 'Segoe UI', Arial, sans-serif;
          background: #f8fafc;
          margin: 0;
          padding: 0;
          color: #222;
        }
        
        header {
          text-align: center;
          padding: 32px 0 16px 0;
          background: #fff;
        }
        
        .profile-pic {
          width: 120px;
          height: 120px;
          border-radius: 50%;
          object-fit: cover;
          margin-top: 16px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        main {
          max-width: 420px;
          margin: 32px auto;
          background: #fff;
          border-radius: 10px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.04);
          padding: 32px 24px;
        }
        
        h1, h2 {
          margin: 0 0 16px 0;
          font-weight: 600;
        }
        
        section {
          margin-bottom: 28px;
        }
        
        footer {
          text-align: center;
          padding: 18px 0;
          font-size: 0.95em;
          color: #888;
          background: #f0f0f0;
        }
        
        footer a {
          color: #2d6cdf;
          text-decoration: none;
        }
        
        @media (max-width: 600px) {
          main {
            padding: 18px 8px;
          }
          .profile-pic {
            width: 90px;
            height: 90px;
          }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Personal Introduction</h1>
        <img src="profile.jpg" alt="Profile Picture" class="profile-pic">
    </header>
    <main>
        <section>
            <h2>About Me</h2>
            <p>Hello! My name is [ศิรสิทธิ์ ดุงเเก้ว]. I am a [นักศึกษา CS ปี2]. I enjoy [อ่านหนังสือ/ออกกำลังกาย/วาดภาพ].</p>
        </section>
        <section>
            <h2>Contact Information</h2>
            <p>You can reach me at: [7022004sd@gmail.com]</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 [ศิรสิทธิ์ ดุงเเก้ว]. All rights reserved.</p>
        <a href="https://github.com/Drewsama1122" target="_blank">GitHub</a>
    </footer>
</body>
</html>
